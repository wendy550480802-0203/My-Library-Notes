/* ---- Fuse.js 模糊搜索初始化 ---- */
var fuseOptions = {
  keys: ['label'],
  threshold: 0.4,
  distance: 100,
  includeScore: true
};
var fuseBooks = new Fuse(SEARCH_DATA, fuseOptions);
var fuseConcepts = new Fuse(CONCEPT_SEARCH.map(function(c){ return {label:c}; }), fuseOptions);

/* ---- 聚类筛选按钮 ---- */
var filterBar = document.getElementById("cluster-filters");
CLUSTER_LIST.forEach(function(clusterName){
  var btn = document.createElement("button");
  btn.className = "filter-btn";
  btn.textContent = clusterName;
  btn.dataset.cluster = clusterName;
  btn.addEventListener("click", function(){
    toggleClusterFilter(clusterName, btn);
  });
  filterBar.appendChild(btn);
});

var activeClusterFilter = null;

function toggleClusterFilter(clusterName, btn){
  if(activeClusterFilter === clusterName){
    // 取消筛选
    activeClusterFilter = null;
    btn.classList.remove("active");
    resetFilter();
  } else {
    // 切换筛选
    document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
    activeClusterFilter = clusterName;
    btn.classList.add("active");
    applyClusterFilter(clusterName);
  }
}

function applyClusterFilter(clusterName){
  svg.selectAll(".node").classed("dimmed", function(d){
    return d.cluster !== clusterName;
  });
  svg.selectAll(".link").style("opacity", function(d){
    var srcCluster = (typeof d.source === 'object') ? d.source.cluster : NODES.find(function(n){ return n.id===d.source; }).cluster;
    var tgtCluster = (typeof d.target === 'object') ? d.target.cluster : NODES.find(function(n){ return n.id===d.target; }).cluster;
    return (srcCluster === clusterName || tgtCluster === clusterName) ? 1 : 0.05;
  });
}

function resetFilter(){
  svg.selectAll(".node").classed("dimmed", false);
  svg.selectAll(".link").style("opacity", null);
}

/* ---- 相关书籍面板 ---- */
var sidePanel = document.getElementById("side-panel");
var panelTitle = document.getElementById("panel-book-title");
var panelList = document.getElementById("panel-list");
var panelBookTitle = document.getElementById("panel-book-title");

function showRelatedPanel(bookId) {
  var related = RELATED_DATA[bookId];
  var nodeData = NODES.find(function(n){ return n.id === bookId; });
  if (!nodeData) return;

  panelTitle.textContent = "「" + nodeData.label + "」的相关书籍";

  if (!related || related.length === 0) {
    panelList.innerHTML = '<div id="panel-empty">暂无相关书籍<br><span style="font-size:11px;color:#475569;">（没有共享概念的其他藏书）</span></div>';
  } else {
    panelList.innerHTML = related.map(function(r){
      var color = CLUSTER_COLORS[r.cluster] || "#94a3b8";
      var conceptsStr = (r.shared_concepts||[]).slice(0,3).join("、");
      return '<div class="panel-item" data-id="'+r.id+'">'
        + '<div class="panel-item-title" style="color:'+color+'">'+r.title+'</div>'
        + '<div class="panel-item-meta">共享 <span class="panel-item-shared">'+r.shared+'</span> 个概念'
        + (conceptsStr ? '（'+conceptsStr+'…）' : '')
        + '</div></div>';
    }).join("");
  }

  sidePanel.classList.add("open");
}

function hideRelatedPanel() {
  sidePanel.classList.remove("open");
}

document.getElementById("panel-close").addEventListener("click", function(e){
  e.stopPropagation();
  hideRelatedPanel();
});

panelList.addEventListener("click", function(e){
  var item = e.target.closest(".panel-item");
  if (!item) return;
  var id = item.getAttribute("data-id");
  if (id) highlightNode(id);
});

/* ---- 搜索（Fuse.js 模糊搜索 + 实时高亮）---- */
var searchBox = document.getElementById("search-box");
var searchResults = document.getElementById("search-results");
var currentHighlight = null;  // 当前高亮节点 ID

searchBox.addEventListener("input", function(){
  var q = this.value.trim();
  if(!q) {
    searchResults.style.display = "none";
    clearHighlight();
    return;
  }

  // 使用 Fuse.js 模糊搜索
  var bookResults = fuseBooks.search(q).slice(0, 8);
  var conceptResults = fuseConcepts.search(q).slice(0, 6);

  var matches = [];
  bookResults.forEach(function(r){ matches.push(r.item); });
  conceptResults.forEach(function(r){ matches.push({id:r.item.label, label:r.item.label, type:"concept"}); });

  if(!matches.length) { searchResults.style.display="none"; clearHighlight(); return; }

  searchResults.innerHTML = matches.map(function(d){
    return '<div class="sri" data-id="'+d.id+'">'+d.label+'</div>';
  }).join("");
  searchResults.style.display="block";

  // 实时高亮：高亮第一个匹配项
  if(matches.length > 0){
    highlightNodeAndRelated(matches[0].id, matches[0].label);
  }
});

searchResults.addEventListener("click", function(e){
  var el = e.target.closest(".sri");
  if(!el) return;
  var id = el.getAttribute("data-id");
  var label = el.textContent;
  highlightNodeAndRelated(id, label);
  searchResults.style.display="none";
  searchBox.value = label;
});

/* 高亮节点 + 关联节点（概念反向搜索） */
function highlightNodeAndRelated(id, label){
  clearHighlight();
  currentHighlight = id;

  // 判断是否是概念
  var isConcept = id.startsWith("concept_") || CONCEPT_SEARCH.indexOf(label) > -1;

  if(isConcept){
    // 概念反向搜索：高亮概念 + 所有关联书籍
    var conceptName = id.startsWith("concept_") ? id.replace("concept_","") : label;
    var relatedBookIds = CONCEPT_INDEX[conceptName] || [];

    svg.selectAll(".node").classed("dimmed", function(d){
      return d.id !== id && relatedBookIds.indexOf(d.id) === -1;
    });
    svg.selectAll(".link").style("opacity", function(d){
      var sid = (typeof d.source === 'object') ? d.source.id : d.source;
      var tid = (typeof d.target === 'object') ? d.target.id : d.target;
      return (sid === id || tid === id) ? 1 : 0.05;
    });
  } else {
    // 书籍高亮：高亮该书 + 关联概念
    svg.selectAll(".node").classed("dimmed", function(d){
      return d.id !== id;
    });
    svg.selectAll(".link").style("opacity", function(d){
      var sid = (typeof d.source === 'object') ? d.source.id : d.source;
      var tid = (typeof d.target === 'object') ? d.target.id : d.target;
      return (sid === id || tid === id) ? 1 : 0.05;
    });
  }

  // 移动视角
  moveToNode(id);
}

function clearHighlight(){
  svg.selectAll(".node").classed("dimmed", false);
  svg.selectAll(".link").style("opacity", null);
  currentHighlight = null;
}

function moveToNode(id){
  var nd = nodeMap.get(id);
  if(!nd) return;
  var t = d3.zoomTransform(svg.node());
  var x = -nd.x*t.k + width/2;
  var y = -nd.y*t.k + height/2;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(x,y).scale(t.k));
}

function highlightNode(id){
  highlightNodeAndRelated(id, "");
}

/* ---- D3 力导向图 ---- */
var width = window.innerWidth;
var height = window.innerHeight - 48;
var svg = d3.select("#graph").append("svg").attr("width",width).attr("height",height);
var g = svg.append("g");
var zoom = d3.zoom().scaleExtent([0.05,5]).on("zoom", function(e){ g.attr("transform", e.transform); });
svg.call(zoom);

var simulation = d3.forceSimulation(NODES)
  .force("link", d3.forceLink(LINKS).id(function(d){ return d.id; }).distance(90))
  .force("charge", d3.forceManyBody().strength(-220))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collision", d3.forceCollide(30))
  .force("x", d3.forceX(width/2).strength(0.06))
  .force("y", d3.forceY(height/2).strength(0.06));

var link = g.append("g").attr("class","links").selectAll("line")
  .data(LINKS).join("line")
  .attr("class", function(d){ return "link" + ((d.type==="book-book") ? " link-book" : ""); });

var node = g.append("g").attr("class","nodes").selectAll("g")
  .data(NODES).join("g")
  .attr("class","node")
  .attr("data-id", function(d){ return d.id; })
  .call(d3.drag()
    .on("start", function(event,d){ if(!event.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", function(event,d){ d.fx=event.x; d.fy=event.y; })
    .on("end", function(event,d){ if(!event.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

node.append("circle")
  .attr("r", function(d){ return d.type==="book" ? 5+Math.sqrt(d.degree||1)*1.5 : 7; })
  .attr("fill", function(d){ return d.type==="book" ? (CLUSTER_COLORS[d.cluster]||"#94a3b8") : "#f59e0b"; })
  .attr("stroke", function(d){ return d.type==="book" ? "#0f172a" : "#d97706"; })
  .on("mouseover", function(event,d){
    var html = d.type==="book"
      ? "<strong>📖 "+d.label+"</strong><br>连通度:"+d.degree+"<br>聚类:"+(d.cluster||"未分类")
      : "<strong>💡 "+d.concept+"</strong><br>关联书籍:"+d.book_count;
    d3.select("#tooltip").html(html).style("opacity",1)
      .style("left",(event.pageX+12)+"px").style("top",(event.pageY-8)+"px");
  })
  .on("mouseout", function(){ d3.select("#tooltip").style("opacity",0); })
  .on("click", function(event,d){
    event.stopPropagation();
    if(d.type==="book") {
      showRelatedPanel(d.id);
    }
    if(d.type==="book" && d.path) window.open(d.path, "_blank");
  });

node.append("text").attr("dx",11).attr("dy","0.35em").text(function(d){ return d.label; });

var nodeMap = new Map();
simulation.on("tick", function(){
  link
    .attr("x1",function(d){ return d.source.x; })
    .attr("y1",function(d){ return d.source.y; })
    .attr("x2",function(d){ return d.target.x; })
    .attr("y2",function(d){ return d.target.y; });
  node.attr("transform", function(d){
    nodeMap.set(d.id, d);
    return "translate("+d.x+","+d.y+")";
  });
});

/* 点击空白区域关闭面板 + 清除高亮 */
svg.on("click", function(){
  hideRelatedPanel();
  searchResults.style.display="none";
  if(currentHighlight) clearHighlight();
});

/* ---- 图例 ---- */
var legendItems = d3.select("#legend").append("div").style("font-weight","bold").style("margin-bottom","8px").text("🎨 聚类颜色").node().parentNode;
Object.entries(CLUSTER_COLORS).forEach(function(entry){
  var li = d3.select(legendItems).append("div").attr("class","li");
  li.append("span").attr("class","ld").style("background",entry[1]);
  li.append("span").text(entry[0]);
});

/* ---- 按钮 ---- */
var conceptVisible = true;
d3.select("#btn-toggle-concept").on("click", function(){
  conceptVisible = !conceptVisible;
  svg.selectAll(".node").filter(function(d){ return d.type==="concept"; })
    .style("display", conceptVisible?"block":"none");
  svg.selectAll(".link").filter(function(d){ return d.source.type==="concept"||d.target.type==="concept"; })
    .style("display", conceptVisible?"block":"none");
  d3.select(this).text(conceptVisible?"隐藏概念":"显示概念").classed("active",!conceptVisible);
});
d3.select("#btn-reset").on("click", function(){
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  hideRelatedPanel();
  clearHighlight();
  searchBox.value = "";
  resetFilter();
});

/* 更新统计 */
d3.select("#node-count").text(NODES.length);
d3.select("#link-count").text(LINKS.length);
d3.select("#cluster-count").text(Object.keys(CLUSTER_COLORS).length);
</script>
</body>
</html>
