var CONCEPT_SEARCH = [];


/* ---- 搜索 ---- */
var searchBox = document.getElementById("search-box");
var searchResults = document.getElementById("search-results");

searchBox.addEventListener("input", function(){
  var q = this.value.trim().toLowerCase();
  if(!q) { searchResults.style.display="none"; return; }
  var combined = SEARCH_DATA.concat(CONCEPT_SEARCH.map(function(c){ return {id:c,label:c,type:"concept"}; }));
  var matches = combined.filter(function(d){ return d.label.toLowerCase().indexOf(q)>-1; }).slice(0,12);
  if(!matches.length) { searchResults.style.display="none"; return; }
  searchResults.innerHTML = matches.map(function(d){
    return '<div class="sri" data-id="'+d.id+'">'+d.label+'</div>';
  }).join("");
  searchResults.style.display="block";
});

searchResults.addEventListener("click", function(e){
  var el = e.target.closest(".sri");
  if(!el) return;
  highlightNode(el.getAttribute("data-id"));
  searchResults.style.display="none";
  searchBox.value="";
});

function highlightNode(id){
  svg.selectAll(".node").classed("highlight", function(d){ return d.id===id; });
  svg.selectAll(".link").classed("highlight", function(d){
    return d.source.id===id || d.target.id===id;
  });
  var nd = nodeMap.get(id);
  if(!nd) return;
  var t = d3.zoomTransform(svg.node());
  var x = -nd.x*t.k + width/2;
  var y = -nd.y*t.k + height/2;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(x,y).scale(t.k));
}

/* ---- 详情面板 ---- */
function showDetail(d){
  var panel = document.getElementById("detail-panel");
  var title = document.getElementById("detail-title");
  var body  = document.getElementById("detail-body");

  title.textContent = (d.title || d.label || d.id || "").replace(/\.md$/, "");

  var html = "";

  /* 元信息 */
  html += '<div class="section"><div class="meta-row"><span class="meta-label">类型</span><span>' + (d.type==="concept" ? "💡 概念" : "📖 笔记") + '</span></div>';
  if(d.domain)   html += '<div class="meta-row"><span class="meta-label">领域</span><span>' + d.domain + '</span></div>';
  if(d.cluster) html += '<div class="meta-row"><span class="meta-label">聚类</span><span>' + d.cluster + '</span></div>';
  if(d.degree !== undefined) html += '<div class="meta-row"><span class="meta-label">连通度</span><span>' + d.degree + '</span></div>';
  html += '</div>';

  /* 摘要 */
  if(d.summary){
    html += '<div class="section"><div class="section-title">📝 摘要</div><div class="summary">' + escapeHtml(d.summary.slice(0,500)) + (d.summary.length>500 ? "..." : "") + '</div></div>';
  }

  /* 关键词 */
  if(d.keywords && d.keywords.length){
    html += '<div class="section"><div class="section-title">🔑 关键词</div>';
    d.keywords.forEach(function(kw){ html += '<span class="keyword">' + escapeHtml(kw) + '</span>'; });
    html += '</div>';
  }

  /* 标签 */
  if(d.tags && d.tags.length){
    html += '<div class="section"><div class="section-title">🏷️ 标签</div>';
    d.tags.forEach(function(tg){ html += '<span class="tag">' + escapeHtml(tg) + '</span>'; });
    html += '</div>';
  }

  /* 打开原文件 */
  if(d.path){
    html += '<div class="section"><a class="open-link" href="file://' + d.path.replace(/"/g,"&quot;") + '" target="_blank">📂 在 Obsidian 中打开</a></div>';
  }

  body.innerHTML = html;
  panel.classList.add("open");
}

function closeDetail(){
  document.getElementById("detail-panel").classList.remove("open");
}

function escapeHtml(s){
  if(!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ---- D3 力导向图 ---- */
var width  = window.innerWidth;
var height = window.innerHeight - 48;
var svg = d3.select("#graph").append("svg").attr("width",width).attr("height",height);
var g = svg.append("g");
var zoom = d3.zoom().scaleExtent([0.05,5]).on("zoom", function(e){ g.attr("transform", e.transform); });
svg.call(zoom);

var simulation = d3.forceSimulation(NODES)
  .force("link",    d3.forceLink(LINKS).id(function(d){ return d.id; }).distance(90))
  .force("charge",  d3.forceManyBody().strength(-220))
  .force("center",  d3.forceCenter(width/2, height/2))
  .force("collision", d3.forceCollide(30))
  .force("x",       d3.forceX(width/2).strength(0.06))
  .force("y",       d3.forceY(height/2).strength(0.06));

var link = g.append("g").attr("class","links").selectAll("line")
  .data(LINKS).join("line")
  .attr("class", function(d){ return "link" + ((d.type==="book-book") ? " link-book" : ""); });

var node = g.append("g").attr("class","nodes").selectAll("g")
  .data(NODES).join("g")
  .attr("class","node")
  .attr("data-id", function(d){ return d.id; })
  .call(d3.drag()
    .on("start", function(event,d){ if(!event.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  function(event,d){ d.fx=event.x; d.fy=event.y; })
    .on("end",   function(event,d){ if(!event.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

node.append("circle")
  .attr("r", function(d){ return d.type==="book" ? 5+Math.sqrt(d.degree||1)*1.5 : 7; })
  .attr("fill", function(d){ return d.type==="book" ? (CLUSTER_COLORS[d.cluster]||"#94a3b8") : "#6366f1"; })
  .attr("stroke", function(d){ return d.type==="book" ? "#0f172a" : "#d97706"; })
  .on("mouseover", function(event,d){
    var html = d.type==="book"
      ? "<strong>📖 "+d.label+"</strong><br>连通度:"+d.degree+"<br>聚类:"+(d.cluster||"未分类")
      : "<strong>💡 "+d.concept+"</strong><br>关联:"+d.book_count+" 篇";
    d3.select("#tooltip").html(html).style("opacity",1)
      .style("left",(event.pageX+12)+"px").style("top",(event.pageY-8)+"px");
  })
  .on("mouseout", function(){ d3.select("#tooltip").style("opacity",0); })
  .on("click", function(event,d){
    event.stopPropagation();
    showDetail(d);
  });

node.append("text").attr("dx",11).attr("dy","0.35em").text(function(d){ return d.label; });

var nodeMap = new Map();
simulation.on("tick", function(){
  link
    .attr("x1", function(d){ return d.source.x; })
    .attr("y1", function(d){ return d.source.y; })
    .attr("x2", function(d){ return d.target.x; })
    .attr("y2", function(d){ return d.target.y; });
  node.attr("transform", function(d){
    nodeMap.set(d.id, d);
    return "translate("+d.x+","+d.y+")";
  });
});

/* ---- 图例 ---- */
var legendItems = d3.select("#legend").append("div").style("font-weight","bold").style("margin-bottom","8px").text("🎨 聚类").node().parentNode;
Object.entries(CLUSTER_COLORS).forEach(function(entry){
  var li = d3.select(legendItems).append("div").attr("class","li");
  li.append("span").attr("class","ld").style("background",entry[1]);
  li.append("span").text(entry[0]);
});

/* ---- 按钮 ---- */
var conceptVisible = true;
d3.select("#btn-toggle-concept").on("click", function(){
  conceptVisible = !conceptVisible;
  svg.selectAll(".node").filter(function(d){ return d.type==="concept"; })
    .style("display", conceptVisible?"block":"none");
  svg.selectAll(".link").filter(function(d){ return d.source.type==="concept"||d.target.type==="concept"; })
    .style("display", conceptVisible?"block":"none");
  d3.select(this).text(conceptVisible?"隐藏概念":"显示概念").classed("active",!conceptVisible);
});
d3.select("#btn-reset").on("click", function(){
  closeDetail();
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
});

svg.on("click", function(){ searchResults.style.display="none"; });
document.addEventListener("click", function(e){
  if(!document.getElementById("detail-panel").contains(e.target) && !e.target.closest(".node")){
    closeDetail();
  }
});

/* 更新统计 */
d3.select("#node-count").text(NODES.length);
d3.select("#link-count").text(LINKS.length);
</script>
</body>
</html>
